<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Fontdiner+Swanky&display=swap" rel="stylesheet">
  <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap');
       
        @keyframes float {
          0% { transform: translateY(0px); }
          50% { transform: translateY(-8px); }
          100% { transform: translateY(0px); }
        }
        .animated-pet {
          animation: float 3s ease-in-out infinite;
        }
    </style>
    <title>TAMAGOTCHI</title>
</head>
<body class="min-h-screen sm:h-screen w-screen sm:overflow-hidden flex items-center justify-center bg-linear-to-br from-[#1e1b4b] via-[#311042] to-[#0f172a] text-slate-100 font-['Quicksand'] select-none p-4">

    <div id="game-card-root" class="game-card bg-slate-900/80 backdrop-blur-xl border-4 border-fuchsia-500 shadow-[0_0_40px_rgba(217,70,239,0.4)] w-full max-w-xl sm:max-h-[95vh] sm:rounded-3xl rounded-2xl flex flex-col p-5 sm:p-6 transition-all duration-300">
    
        <div class="flex flex-col items-center text-center border-b-2 border-slate-700/50 pb-3 mb-3 shrink-0">
            <div id="avatar-container" class="flex items-center justify-center w-44 h-44 sm:w-60 sm:h-60 mb-2 animated-pet shrink-0">
                <img id="pet-avatar" src="./img/start.jpg" alt="Tamagotchi" class="max-w-full max-h-full object-contain rounded-2xl drop-shadow-[0_10px_20px_rgba(255,255,255,0.15)]">
            </div>     

            <div class="w-full shrink-0">
                <h1 id="pet-name" style="font-family: 'Fontdiner Swanky', serif;" class="text-4xl sm:text-5xl mb-2 text-transparent bg-clip-text bg-linear-to-r from-cyan-400 to-fuchsia-400 tracking-wide uppercase cursor-pointer select-none"></h1>
                <p id="pet-description" class="text-sm sm:text-base leading-relaxed text-slate-100 font-medium bg-slate-950/70 p-1.5 sm:p-2 rounded-2xl border border-fuchsia-500/20 shadow-inner text-center tracking-wide my-1">
                </p>
            </div>
        </div>

        <div id="selection-container" class="flex flex-col gap-3 mb-3 w-full shrink-0">
            <select id="main-select-operation" class="border-2 border-fuchsia-500/30 rounded-xl px-4 py-4 w-full text-slate-200 bg-slate-950 focus:border-fuchsia-500 focus:shadow-[0_0_15px_rgba(217,70,239,0.3)] focus:outline-none font-black text-center uppercase tracking-wider text-base cursor-pointer transition-all">
            </select>
            <button id="btn-go" class="w-full bg-linear-to-r from-cyan-500 to-fuchsia-500 text-slate-950 font-black py-3.5 rounded-xl hover:from-cyan-400 hover:to-fuchsia-400 transition-all text-base active:scale-[0.98] cursor-pointer shadow-[0_4px_15px_rgba(34,211,238,0.2)] uppercase tracking-wider">
                Vas a jugar
            </button>
        </div>

        <div id="stats-container" class="hidden bg-slate-950/60 p-2 sm:py-2 sm:px-3.5 border-2 border-fuchsia-500/40 rounded-2xl mb-2 shadow-inner">
        </div>    

        <div id="actions-panel" class="grid grid-cols-3 gap-2 sm:gap-2 shrink-0">
            <button id="btn-duchar" class="bg-linear-to-b from-cyan-400 to-cyan-500 text-white text-sm py-2 sm:py-1 font-bold border-b-4 border-cyan-700 active:border-0 active:translate-y-1 rounded-xl shadow-[0_4px_10px_rgba(34,211,238,0.3)] cursor-pointer uppercase">DUCHAR</button>
            <button id="btn-alimentar" class="bg-linear-to-b from-amber-400 to-amber-500 text-white text-sm py-2 sm:1 font-bold border-b-4 border-amber-700 active:border-0 active:translate-y-1 rounded-xl shadow-[0_4px_10px_rgba(251,191,36,0.3)] cursor-pointer uppercase">ALIMENTAR</button>
            <button id="btn-jugar" class="bg-linear-to-b from-emerald-400 to-emerald-500 text-white text-sm py-2 sm:py-1 font-bold border-b-4 border-emerald-700 active:border-0 active:translate-y-1 rounded-xl shadow-[0_4px_10px_rgba(52,211,153,0.3)] cursor-pointer uppercase">JUGAR</button>
            <button id="btn-dormir" class="bg-linear-to-b from-violet-500 to-violet-600 text-white text-sm py-2 sm:py-1 font-bold border-b-4 border-violet-800 active:border-0 active:translate-y-1 rounded-xl shadow-[0_4px_10px_rgba(139,92,246,0.3)] cursor-pointer uppercase">DORMIR</button>
            <button id="btn-reprender" class="bg-linear-to-b from-rose-500 to-rose-600 text-white text-sm py-2 sm:py-1 font-bold border-b-4 border-rose-800 active:border-0 active:translate-y-1 rounded-xl shadow-[0_4px_10px_rgba(244,63,94,0.3)] cursor-pointer uppercase">REPRENDER</button>
            <button id="btn-acariciar" class="bg-linear-to-b from-pink-400 to-pink-500 text-white text-sm py-2 sm:py-1 font-bold border-b-4 border-pink-700 active:border-0 active:translate-y-1 rounded-xl shadow-[0_4px_10px_rgba(244,114,182,0.3)] cursor-pointer uppercase">ACARICIAR</button>
        </div>    

        <button id="btn-change-pet" class="hidden w-full bg-slate-800/80 hover:bg-slate-700/90 text-slate-200 font-bold py-3 px-4 rounded-xl transition-all border border-slate-700/50 uppercase tracking-wider text-xs mt-3 shrink-0">
            ⬅️ Volver al Inicio
        </button>
    </div>
    
    <script src="./js/classTamagochi.js"></script>
    <script src="./js/tamagotchis.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
